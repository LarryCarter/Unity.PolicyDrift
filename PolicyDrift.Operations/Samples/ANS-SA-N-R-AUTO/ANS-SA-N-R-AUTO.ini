[Policy]
PolicyID=ANS-SA-N-R-AUTO
PolicyName=ANS-SA-N-R-AUTO
SearchForUsages=No
PolicyType=Regular
ImmediateInterval=1
Interval=1440
MaxConcurrentConnections=5
AllowedSafes=.*-N-APP-.*
MinValidityPeriod=60
ResetOverridesMinValidity=Yes
ResetOverridesTimeFrame=Yes
Timeout=300
UnlockIfFail=No
UnrecoverableErrors=
MaximumRetries=5
MinDelayBetweenRetries=90
DllName=Cyberark.Extensions.Plugin.AnsibleTower.dll
ExeName=CANetPluginInvoker.exe
XMLFile=Yes
AllowManualChange=Yes
PerformPeriodicChange=Yes
HeadStartInterval=5
FromHour=0
ToHour=23
ChangeNotificationPeriod=1
DaysNotifyPriorExpiration=7

VFAllowManualVerification=Yes
VFPerformPeriodicVerification=Yes
VFfromHour=0
VFToHour=23

RCAllowManualReconciliation=Yes
RCAutomaticReconcileWhenUnsynched=Yes
RCReconcileReasons=2114,2115
RCFromHour=0
RCToHour=23

NFNotifyPriorExpiration=Yes
NFPriorExpirationRecipients=
NFPriorExpirationFromHour=0
NFPriorExpirationToHour=7
NFPriorExpirationInterval=60

NFNotifyOnPasswordDisable=Yes
NFOnPasswordDisableRecipients=

NFNotifyOnVerificationErrors=Yes
NFOnVerificationErrorsRecipients=

NFNotifyOnPasswordUsed=No
NFOnPasswordUsedRecipients=

PasswordLength=16
MinUpperCase=2
MinLowerCase=2
MinDigit=1
MinSpecial=1
PasswordForbiddenChars="\"
PreventSameCharPerPrevPassPosition=No
PreventRepeatingCharacters=No

[ADExtraInfo]

[ChangeTask]
EnforcePasswordPolicyOnManualChange=No
EnforcePasswordVersionHistory=7

[ExtraInfo]
UseSSL=Yes
Debug=No
ApiVersion=v2